<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Google Image Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        /* Link powrotny w prawym górnym rogu */
        div.links {
            text-align: right;
            margin: 10px 20px;
        }

        /* Formularz wyszukiwania obrazów */
        form.image-search-form {
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
        }

        form.image-search-form input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 24px;
            box-sizing: border-box;
        }

        form.image-search-form input[type="submit"] {
            margin-top: 12px;
            width: 150px;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 24px;
            background-color: #f8f8f8;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        form.image-search-form input[type="submit"]:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="links">
        <a href="index.html">Google Search</a>
    </div>

    <form class="image-search-form" action="https://www.google.com/search" method="get">
        <input type="hidden" name="tbm" value="isch">
        <input type="text" name="q" placeholder="Szukaj obrazów">
        <input type="submit" value="Image Search">
    </form>
</body>
</html>
